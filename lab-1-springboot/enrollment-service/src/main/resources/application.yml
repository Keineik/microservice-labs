server:
  port: 8083

spring:
  application:
    name: enrollment-service
  datasource:
    url: jdbc:h2:mem:enrollmentdb;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console
  cloud:
    openfeign:
      circuitbreaker:
        # Wrap every Feign call in a circuit breaker so fallbacks can fire.
        enabled: true
      client:
        config:
          default:
            # Fail fast rather than hang if a downstream is slow/unreachable.
            connect-timeout: 2000
            read-timeout: 3000

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    # Fetch the registry more often than the 30s default so discovery is quick in dev.
    registry-fetch-interval-seconds: 10
  instance:
    prefer-ip-address: true
    # Renew the lease more often than the 30s default so registration shows up fast.
    lease-renewal-interval-in-seconds: 10

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info
