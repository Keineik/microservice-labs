server:
  port: 8080

spring:
  application:
    name: web-client
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 2000
            read-timeout: 3000

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    # Fetch the registry more often than the 30s default so discovery is quick in dev.
    registry-fetch-interval-seconds: 10
  instance:
    prefer-ip-address: true
    # Renew the lease more often than the 30s default so registration shows up fast.
    lease-renewal-interval-in-seconds: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info
