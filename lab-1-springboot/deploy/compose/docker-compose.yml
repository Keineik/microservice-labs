name: course-registration

# All five images are built from the same multi-stage Dockerfile, selecting the
# module via the MODULE build-arg. The heavy Maven build layers are shared/cached
# across them. Each service still runs as its own container on its own port with
# its own in-memory database - no shared database.

services:
  discovery-server:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        MODULE: discovery-server
    image: course-reg-discovery:latest
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  student-service:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        MODULE: student-service
    image: course-reg-student:latest
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    ports:
      - "8081:8081"
    depends_on:
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  course-service:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        MODULE: course-service
    image: course-reg-course:latest
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    ports:
      - "8082:8082"
    depends_on:
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  enrollment-service:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        MODULE: enrollment-service
    image: course-reg-enrollment:latest
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    ports:
      - "8083:8083"
    depends_on:
      discovery-server:
        condition: service_healthy
      student-service:
        condition: service_healthy
      course-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  web-client:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        MODULE: web-client
    image: course-reg-web:latest
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    ports:
      - "8080:8080"
    depends_on:
      discovery-server:
        condition: service_healthy
      student-service:
        condition: service_healthy
      enrollment-service:
        condition: service_healthy
